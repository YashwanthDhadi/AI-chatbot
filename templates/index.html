<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <span class="header-icon">✦</span>
        <span>AI Assistant</span>
        <span class="status-dot"></span>
    </div>

    <div id="chat-box">
        <div class="message bot">
            <span class="label">Bot</span>
            <span class="text">Hello! How can I help you today?</span>
        </div>
    </div>

    <div class="input-box">
        <input
            type="text"
            id="user-input"
            placeholder="Ask me anything..."
            onkeydown="if(event.key==='Enter') sendMessage()"
        />
        <button onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if (!message) return;

    addMessage("You", message, "user");
    input.value = "";

    // Show typing indicator
    const typingId = showTyping();

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message })
        });

        const data = await response.json();
        removeTyping(typingId);
        addMessage("Bot", data.reply, "bot");
    } catch (err) {
        removeTyping(typingId);
        addMessage("Bot", "Something went wrong. Please try again.", "bot");
    }
}

function addMessage(sender, text, type) {
    const chatBox = document.getElementById("chat-box");
    const msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerHTML = `<span class="label">${sender}</span><span class="text">${text}</span>`;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
    const chatBox = document.getElementById("chat-box");
    const id = "typing-" + Date.now();
    const el = document.createElement("div");
    el.classList.add("message", "bot", "typing");
    el.id = id;
    el.innerHTML = `<span class="label">Bot</span><span class="text"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>`;
    chatBox.appendChild(el);
    chatBox.scrollTop = chatBox.scrollHeight;
    return id;
}

function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}
</script>

</body>
</html>
